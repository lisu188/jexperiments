<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101419">
    <title th:text="${post.title()} + ' | Java Experiments Journal'">Java Experiments Journal</title>
    <link rel="stylesheet" th:href="@{/assets/site.css(v='20260428-2')}">
</head>
<body>
<header class="article-header">
    <nav>
        <a class="brand" th:href="@{/}">Java Experiments</a>
    </nav>
    <div class="article-header__body">
        <p class="eyebrow" th:text="${post.archiveName()}">ArchiveName</p>
        <h1 th:text="${post.title()}">Post title</h1>
        <p th:text="${post.excerpt()}">Post excerpt</p>
    </div>
</header>

<main class="article-shell">
    <article class="markdown-body" th:utext="${post.html()}"></article>
</main>
</body>
</html>
